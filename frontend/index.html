<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>App Builder</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">

      <h2>Components</h2>

      <button onclick="addButtonComponent()">
        Add Button
      </button>

    </div>


    <!-- CENTER PREVIEW -->
    <div class="preview-section">

      <h2>Mobile Preview</h2>

      <select id="device-select" onchange="changeDevice()">

        <option value="iphone-se">
          iPhone SE
        </option>

        <option value="iphone-14">
          iPhone 14
        </option>

        <option value="android-small">
          Android Small
        </option>

        <option value="android-large">
          Android Large
        </option>

      </select>

      <div id="mobile-preview"></div>

    </div>


    <!-- RIGHT PANEL -->
    <div class="properties">

      <h2>Properties</h2>

      <div id="properties-panel">

        Select a component

      </div>

    </div>

  </div>


  <script src="components/button.js"></script>

  <script src="preview/preview.js"></script>

  <script src="script.js"></script>

</body>

</html>
